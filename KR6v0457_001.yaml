body:
  text: 符號中文字係校訂者所附注內文字是對原文之明顯誤字所作的校訂文字為與其他寫本所共通者羅馬字係依其他資料所補入句讀為校訂者所斷行數之號碼亦為校訂者所加文旁之一二等數字係宮本正尊所撰附注之符號其附注茲不録有意深研者請參閲宮本正尊根本中空第二一五二六一頁校訂本文大乘中宗見解一外四大問何者內四大答骨定堅硬以為地大二血髓津潤是名水大體之溫暖以為火大出息入息以三為風大問何者空識二大答空大者虛通分也識大者了四別心也問此四大因內四大感得外四大因外四大感得內四五大答因內感外問何者內感外答內有骨定堅硬一忘妄六相想敢感得外地大內有津潤忘妄相想敢感得外水大內溫暖忘妄相想七敢感得外火大內有出入息忘妄相想敢感得外風大問何者是五薀八答色受相想行識是五薀問何者是名色薀答形礙以色薀問何九者受薀答領納為受薀問何者相想薀答思想以為想薀一問何者行薀答造作以為行薀問何者是識薀答分別以為識薀二何一一問薀者何義答薀者據聚之義問何者名為蔭答是三蔭名一二覆蓋之義問何者是十八界答六根六塵六識是十八界一三問何者是六根答眼耳鼻舌身意是為六根問何者是一四六塵答色聲香味觸法是六塵問何者是六識答眼識耳識一五鼻識舌識身識意識是十八界問何者十二入答眼一六入耳入鼻入舌入身入意入色入聲入香入味入觸一七入法入眼等六根為內六入色等六塵為外六入內外二六一八為十二問何者為入答眼塵且對通生識道受入愛憎名之一九為入問每聞道歸依三寶何者是三寶答佛寶法寶二僧寶是名三寶問三寶有幾種答有三種問何者是二一三寶答四一體三寶別想相三寶住持三寶是名三種問二二何者一體三寶答法身體有妙覺以為佛寶五以法身二三體有妙軌以為六妙法寶法身體有離六無違爭士是故二四以為僧寶問云何名為妙覺答妙者神用不側稱之二五為妙覺者以法身體中覺了性故故云妙覺問云何二六妙軌答軌者軌則之義以法身體中七中有妙軌持二七義故故云妙軌問云何離違爭答僧者和合為義二八法身無相故則無爭故言體無違爭名之為僧問二九何者為一體答三寶名殊其體不異故名一體問三何以得知三寶名殊其體是一答八維摩經云佛即是三一法法即是衆是三寶皆無為相與虛空等納此義三二邊故名一體問云何名為別相三寶答九六丈丈六化身三三以為佛寶所說言教以為法寶大乘十信已上小三四乘初果已上以為僧寶問何名別相答一一相殊三五名為別相問云何一一相殊答佛寶不是法法不是衆三六形狀不同故名別相問云何名為住持三寶答泥龕三七素像以為佛寶紙素竹帛以法寶剃髮染依衣三八以為僧寶問何者住持像法答令不斷絶故名住持三九問何名像法答像法似之法故名像法問此三種三寶為四一為異答不一不異問云何不一不異答名別故不一體同故名不異四一問有不可得無亦不可得答離有離無問云何離有云四二何離無答自性離故問自性共甚離答本性理中有無四三具俱不可得問畢竟一喙噯作甚謨恁麼物答法身不自名問四四說有四諦何者是四諦答一一大乘四諦小乘四諦問何者四五是大乘四諦答知無生是名苦諦知集無和合是集諦四六知滅無滅是名滅諦以無二法得道是名道諦問何四七者小乘四諦答生死果為苦諦煩惱業為集諦四八寂滅理為滅諦戒定惠為道諦問既言生死果何者生死因四九答集是生死因問記既言生死果亦一二合有無因果何者是五無因果答寂滅理為果戒定惠為因問諸經之中先五一因後果何故此四諦中先果後因答舉理而言則一二合五二先因後果此四諦法佛初成道時為五一三俱倫比丘等五三初聞法要恐難悟解一四且進視果後視因於理無狀殊五四問說有五乘何者是五乘答天乘梵乘聲聞乘緣覺五五乘諸佛如來乘是五乘問天乘答五戒十善得生六欲天是五六名天乘問何者十善答身三口四意三是名十善亦名十惡問何者是五七身三業答不殺不盜不媱淫問何者意三業答不貪不嗔不癡問何五八者口四業答惡口兩舌妄言綺語不問遠此業有其五種十善五九答一人十善二天十善三聲聞十善四緣覺十善五菩薩十六善問何者梵乘答修四無量心生得色界四禪天六一名梵乘問何者四無量心答慈悲喜捨名四無量六二心問何者四無量心答慈能乘悲能拔苦慶彼得樂名之為喜六三平等持心名之為捨問何者聲聞乘答因聲悟道得六四名聲聞問何者緣覺乘答悟十二因緣名緣覺乘六五問緣覺人證悟與聲聞因有何差異以為兩乘答六六維證悟同少有差異分為兩乘何以聲聞之人六七須值佛說四諦法悟其一五道冥理緣覺人出無佛世六八獨悟非常故有差異一六問證因緣法也答無明行識名六九一七名色六入觸受愛取有生老死此是順觀問何者逆觀七答生死衆生生緣有有緣取取緣愛愛緣受受緣觸觸緣六入七一六入緣名色名色緣識識緣行行緣無明無明緣一念不覺問一八此十二因七二緣何者緣因果過十二支答因無明行現在十二支果七三問何者如來乘答六波羅蜜名佛乘問何者是六波羅七四蜜答一布施二持戒三忍辱四精進五禪定六智惠是七五六波羅蜜問何者布施得名波羅蜜答布施之時一九不見受七六者不見施者不見所施財物得名波羅蜜問何者持戒波羅七七蜜答一九不見持戒不見他破戒不見所持戒法得名波羅蜜問何者七八精進答一九不見他解怠不見自修行得名波羅蜜問何者七九禪定答一九不見他亂意不見他所證理得名波羅蜜問何者八智惠答不見自智惠不見他愚癡不見所有惑得名智八一波羅蜜問何者引答前粗引問後後細淨前前粗答前五八二如盲後一如道導問何者二擅土度攝於六資生無怖法此中八三有一二三名曰修行住答擅能攝其六問云何波羅八四蜜中前劣後勝云何此中乃能攝勝答且初二一表視示門中八五作如是說俱能悟其六波羅蜜三事體空之時無勝八六問何者一二三答資生攝一無畏攝二法攝三問何者資生八七答油唯有信心能施財物名為資生也問何者無畏施答由八八持戒思忍耨施財之時一切衆生無有畏具問何者是八九法施答精進禪定智惠攝三一二合一切衆生得其解脫九故名法施問聞說三毒答貪瞋癡是名三毒問此貪九一瞋癡何因如生答由貪不得故生瞋瞋之緣以故生癡由九二此如生問貪者是何義答染著境界名之為貪問瞋九三者何義答增汙憎污境界名之為瞋問癡者何義答於九四緣不了之名為癡問何故得名為毒答此貪瞋癡為毒九五毒中無過此毒答且如世間之毒能雖害一身貪癡瞋癡九六毒能害多身答世間毒能害一身貪瞋癡毒能壞多九七身十善答只如世間毒蛇毒藥之流唯害吾身命九八命終後毒即無用此貪瞋癡毒能令衆生長輪苦海生九九死不絶問如何對持治得免生死答如經所說多貪衆生以不一淨觀為對治多瞋衆生以慈悲觀為對治多癡衆一一生以因緣觀為對治免生死此對持治門中為是二二久境究竟說一二為非二二久境究竟說問見此物否答此不增見我問此物不一三解思惟分別見與不見汝還同此物耶答我亦如是不一四作是念思惟分別見與不見問云何諸法耶答於無心一五中法繼起問心分別一切法耶答休分別一切法王生問一噯作甚一六沒恁麼物答問取此此物答是青黃赤白交我問一噯作甚恁一七物麼交我噯答有情無情是汝見問有情無一八情是汝見問答有情無情是我見問云何是見答我一九亦不作有情無情見問二二久境究竟一噯作甚沒恁麼物一一答法不自名問云何四到倒答常樂我淨問云何倒答一一一無常計常不淨計淨苦計為樂問何者無常計一一二常不淨計淨答是念念遷變無有常住凡夫一一三不了妄計有常是身二三三十六種不淨之變凡夫不了一一四妄計為淨問何者無我計我苦為樂答是五蘊一一五諸佛法和合而有凡夫不了妄計有我是身衆苦一一六之本凡夫不了妄計樂相問何者是八對答於一一七無計有於有計無問何者於無計有何者於一一八有計無答凡夫不了於無計有聲聞不了於有一一九計無二四大乘中宗見解義別行本二五吳法師一二言大乘中宗見解者謂觀三界內外諸法緣起緣性一二一以世谷俗諦猶如幻化夢及陽炎假施設有二六第一義諦此一二二緣生法因果皆空自性涅盤槃無生無滅超過言語及一二三思量境而無所得言宗中中宗者遠離二七捐咸損減及以增益二一二四邊諦故於世諦門中觀緣生內外諸如引有故不謗一二五世法一向是無於第一義而觀諸法超語言境以無所得一二六是故不傍謗出世間是遠離二邊故名二八中宗言見解一二七者以惠之眼了達世俗第一義故名為見解一二八大乘中宗見解一卷
